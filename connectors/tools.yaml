# Concord Connector Manifest
# To do list: edit this to declare which MCP servers Concord should use.
# The Tool Registry reads this at startup no code changes needed.

version: "1.0"

connectors:
  - name: terrasecure
    type: mcp
    url: http://localhost:8001
    token_env: TERRASECURE_TOKEN
    agent: infra
    capabilities:
      - scan_terraform
      - report_sarif

  - name: trivy
    type: mcp
    url: http://localhost:8002
    token_env: TRIVY_TOKEN
    agent: cicd
    capabilities:
      - scan_container
      - scan_filesystem

  - name: checkov
    type: mcp
    url: http://localhost:8003
    token_env: CHECKOV_TOKEN
    agent: cicd
    capabilities:
      - scan_terraform
      - scan_kubernetes

